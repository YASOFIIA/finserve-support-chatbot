<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinServe Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #7BC67E;
      --green-light: #E8F5E9;
      --green-dark:  #4CAF50;
      --white:       #FFFFFF;
      --gray-100:    #F7F9F7;
      --gray-200:    #E8EDE8;
      --gray-400:    #9AA89A;
      --gray-700:    #3D4D3D;
      --radius-md:   10px;
      --radius-lg:   16px;
      --shadow:      0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray-100);
      color: var(--gray-700);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 18px 24px;
      text-align: center;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--gray-700);
      letter-spacing: -0.3px;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ── CHAT WINDOW ── */
    .chat-window {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-window__header {
      background: var(--green);
      padding: 16px 20px;
    }

    .chat-window__header h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 2px;
    }

    .chat-window__header p {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.82);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--white);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── MESSAGES ── */
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 340px;
      max-height: 400px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }

    .message--bot  { align-self: flex-start; }
    .message--user { align-self: flex-end;   }

    .message__bubble {
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .message--bot  .message__bubble {
      background: var(--green-light);
      color: var(--gray-700);
      border-bottom-left-radius: 3px;
    }

    .message--user .message__bubble {
      background: var(--green);
      color: var(--white);
      border-bottom-right-radius: 3px;
    }

    .message__time {
      font-size: 0.7rem;
      color: var(--gray-400);
      margin-top: 4px;
      padding: 0 2px;
    }

    .message--user .message__time { text-align: right; }

    /* empty state */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--gray-400);
      font-size: 0.85rem;
      gap: 8px;
      padding: 40px 0;
    }

    .chat-empty__icon { font-size: 2rem; }

    /* ── INPUT ── */
    .chat-input {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid var(--gray-200);
    }

    .chat-input__field {
      flex: 1;
      border: 1.5px solid var(--gray-200);
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--gray-700);
      outline: none;
      transition: border-color 0.2s;
      background: var(--gray-100);
    }

    .chat-input__field:focus {
      border-color: var(--green);
      background: var(--white);
    }

    .chat-input__field::placeholder { color: var(--gray-400); }

    .chat-input__btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .chat-input__btn:hover   { background: var(--green-dark); }
    .chat-input__btn:active  { transform: scale(0.95); }
    .chat-input__btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .chat-input__btn svg {
      width: 18px;
      height: 18px;
      fill: var(--white);
    }

    /* typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      background: var(--green-light);
      border-radius: var(--radius-md);
      border-bottom-left-radius: 3px;
      width: fit-content;
      align-self: flex-start;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: var(--green-dark);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-5px); }
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--gray-200);
      background: var(--white);
      padding: 16px 24px;
    }

    .footer-inner {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-brand {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gray-700);
    }

    .footer-location {
      font-size: 0.78rem;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .footer-socials {
      display: flex;
      gap: 12px;
    }

    .footer-socials a {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-400);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .footer-socials a:hover {
      border-color: var(--green);
      color: var(--green-dark);
    }

    .footer-socials svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header role="banner">
    <h1>FinServe Support</h1>
  </header>

  <!-- ── MAIN ── -->
  <main role="main">
    <section class="chat-window" aria-label="Chat with Maya">

      <div class="chat-window__header">
        <h2>Maya — Your Client Support</h2>
        <p><span class="status-dot" aria-hidden="true"></span> Online · Available 24/7</p>
      </div>

      <div class="chat-messages" id="chatMessages" role="log" aria-live="polite" aria-label="Chat messages">
        <div class="chat-empty" id="emptyState">
          <span class="chat-empty__icon" aria-hidden="true">👋</span>
          <span>Hi! Ask me anything about your account or loans.</span>
        </div>
      </div>

      <form class="chat-input" id="chatForm" aria-label="Send a message">
        <label for="userInput" class="sr-only">Your message</label>
        <input
          type="text"
          id="userInput"
          class="chat-input__field"
          placeholder="Type your question…"
          autocomplete="off"
          aria-required="true"
        />
        <button type="submit" class="chat-input__btn" aria-label="Send message">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </form>

    </section>
  </main>

  <!-- ── FOOTER ── -->
  <footer role="contentinfo">
    <div class="footer-inner">
      <div>
        <p class="footer-brand">FinServe</p>
        <p class="footer-location">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
          </svg>
          Warsaw, Poland
        </p>
      </div>

      <nav class="footer-socials" aria-label="Social media links">
        <!-- Instagram -->
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="FinServe on Instagram">
          <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        </a>
        <!-- Facebook -->
        <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" aria-label="FinServe on Facebook">
          <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.269h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
        </a>
        <!-- LinkedIn -->
        <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="FinServe on LinkedIn">
          <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </a>
      </nav>
    </div>
  </footer>

  <style>
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); border: 0;
    }
  </style>

  <script>
    const form        = document.getElementById('chatForm');
    const input       = document.getElementById('userInput');
    const messagesEl  = document.getElementById('chatMessages');
    const emptyState  = document.getElementById('emptyState');
    const submitBtn   = form.querySelector('button[type="submit"]');

    const messages = [];

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function removeEmpty() {
      if (emptyState) emptyState.remove();
    }

    function appendMessage(role, text) {
      removeEmpty();
      const wrapper = document.createElement('div');
      wrapper.className = `message message--${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'message__bubble';
      bubble.textContent = text;

      const time = document.createElement('div');
      time.className = 'message__time';
      time.textContent = getTime();

      wrapper.appendChild(bubble);
      wrapper.appendChild(time);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'typing';
      el.id = 'typingIndicator';
      el.setAttribute('aria-label', 'Maya is typing');
      el.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function setLoading(state) {
      submitBtn.disabled = state;
      input.disabled = state;
    }

    async function sendMessage(text) {
      messages.push({ role: 'user', content: text });
      appendMessage('user', text);
      setLoading(true);
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });

        if (!res.ok) throw new Error('Server error');

        const data = await res.json();
        hideTyping();

        let reply = data.reply;
        let escalated = false;

        if (reply.includes('[ESCALATE:')) {
          reply = reply.split('[ESCALATE:')[0].trim();
          escalated = true;
        }

        messages.push({ role: 'assistant', content: data.reply });
        appendMessage('bot', reply);

        if (escalated) {
          const notice = document.createElement('div');
          notice.style.cssText = `
            background: #fff8e6;
            border: 1px solid #f5c842;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: #7a5c00;
            align-self: flex-start;
            max-width: 78%;
            margin-top: 4px;
          `;
          notice.textContent = '⚡ Connecting you to a human agent...';
          messagesEl.appendChild(notice);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      } catch (err) {
        hideTyping();
        appendMessage('bot', 'Sorry, something went wrong. Please try again.');
      } finally {
        setLoading(false);
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      sendMessage(text);
    });
  </script>

</body>
</html>
